# Runtime note:
# These chains are sequential workflow templates.
# They do NOT imply generic parallel execution.
# Use explicit batch/concurrent tooling only when the runtime actually provides it.

plan-build-review:
  description: "Plan, implement, and review — the standard development cycle"
  steps:
    - agent: planner
      prompt: "Plan the implementation for: $INPUT"
    - agent: builder
      prompt: "Implement the following plan:\n\n$INPUT"
    - agent: reviewer
      prompt: "Review this implementation for bugs, style, and correctness:\n\n$INPUT"

plan-build:
  description: "Plan then build — fast two-step implementation without review"
  steps:
    - agent: planner
      prompt: "Plan the implementation for: $INPUT"
    - agent: builder
      prompt: "Based on this plan, implement:\n\n$INPUT"

scout-flow:
  description: "Triple-scout deep recon — explore, validate, verify"
  steps:
    - agent: scout
      prompt: "Explore the codebase and investigate: $INPUT\n\nReport your findings with structure, key files, and patterns."
    - agent: scout
      prompt: "Validate and cross-check the following analysis. Look for anything missed, incorrect, or incomplete:\n\n$INPUT\n\nOriginal request: $ORIGINAL"
    - agent: scout
      prompt: "Final review pass. Verify the analysis below is accurate and complete. Add any missing details or corrections:\n\n$INPUT\n\nOriginal request: $ORIGINAL"

plan-review-plan:
  description: "Iterative planning — plan, critique, then refine with feedback"
  steps:
    - agent: planner
      prompt: "Create a detailed implementation plan for: $INPUT"
    - agent: plan-reviewer
      prompt: "Critically review this implementation plan. Challenge assumptions, find gaps, and suggest improvements:\n\n$INPUT\n\nOriginal request: $ORIGINAL"
    - agent: planner
      prompt: "Revise and improve your implementation plan based on this critique. Address every issue raised and incorporate the recommendations:\n\nOriginal request: $ORIGINAL\n\nCritique:\n$INPUT"

full-review:
  description: "End-to-end pipeline — scout, plan, build, and review"
  steps:
    - agent: scout
      prompt: "Explore the codebase and identify: $INPUT"
    - agent: planner
      prompt: "Based on this analysis, create a plan:\n\n$INPUT"
    - agent: builder
      prompt: "Implement this plan:\n\n$INPUT"
    - agent: reviewer
      prompt: "Review this implementation:\n\n$INPUT"

coordinator-scout-plan-build-review:
  description: "Coordinator-led standard coding flow using sequential specialist handoffs"
  steps:
    - agent: scout
      prompt: "Investigate the repository and identify the files, patterns, and entry points relevant to: $INPUT"
    - agent: planner
      prompt: "Using this investigation, produce an implementation plan for: $ORIGINAL\n\nInvestigation:\n$INPUT"
    - agent: builder
      prompt: "Implement the approved plan below. Preserve existing patterns and keep changes minimal:\n\n$INPUT"
    - agent: reviewer
      prompt: "Review the implementation below for bugs, regressions, style issues, and correctness:\n\n$INPUT"

coordinator-plan-critique-revise:
  description: "Coordinator-led planning loop with explicit critic pass"
  steps:
    - agent: planner
      prompt: "Create a detailed implementation plan for: $INPUT"
    - agent: plan-reviewer
      prompt: "Critique this plan for gaps, bad assumptions, risky sequencing, and missing edge cases:\n\n$INPUT\n\nOriginal request: $ORIGINAL"
    - agent: planner
      prompt: "Revise the plan below to address every critique item:\n\nOriginal request: $ORIGINAL\n\nCritique:\n$INPUT"

coordinator-review-redteam-arbitrate:
  description: "Sequential validation flow for risky or conflicting outcomes"
  steps:
    - agent: reviewer
      prompt: "Review the following output for correctness, quality, and likely regressions:\n\n$INPUT"
    - agent: red-team
      prompt: "Analyze the following output for security issues, abuse cases, and adversarial failure modes:\n\n$INPUT"
    - agent: arbiter
      prompt: "Given the reviewer and red-team findings below, decide whether to accept, reroute, retry, or escalate:\n\n$INPUT"

coordinator-research-sequential:
  description: "Research-oriented sequential flow when no explicit parallel runtime path exists"
  steps:
    - agent: scout
      prompt: "Investigate the repository, docs, and relevant structure for: $INPUT"
    - agent: planner
      prompt: "Synthesize the investigation into a research summary, architecture framing, and key decisions for: $ORIGINAL\n\nInvestigation:\n$INPUT"
    - agent: plan-reviewer
      prompt: "Challenge this research summary and identify missing assumptions, weak conclusions, or unverified claims:\n\n$INPUT\n\nOriginal request: $ORIGINAL"
