# Colemak HNEI keybindings for jjui
# Navigation: j→n, k→e, l→i (h stays)
# Displaced: n→j (new), e→k (edit), i→l (interactive)
# Shift: J→N, K→E, L→I (where applicable)

[[bindings]]
action = "revisions.move_down"
key = "n"
scope = "revisions"
desc = "down (colemak)"

[[bindings]]
action = "revisions.move_up"
key = "e"
scope = "revisions"
desc = "up (colemak)"

[[bindings]]
action = "revisions.open_details"
key = "i"
scope = "revisions"
desc = "details (colemak)"

[[bindings]]
action = "revset.edit"
key = "shift+i"
scope = "revisions"
desc = "revset (colemak)"

# Displaced keys: n→j (new), e→k (edit)
[[bindings]]
action = "revisions.new"
key = "j"
scope = "revisions"
desc = "new (colemak)"

[[bindings]]
action = "revisions.edit"
key = "k"
scope = "revisions"
desc = "edit (colemak)"

